<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* الخط */
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600;800&display=swap');

body{
  margin:0;
  font-family:'Montserrat', sans-serif;
  background: radial-gradient(circle at top, #111111, #000000);
  color:white;
}

/* العنوان + الشعار */
h1{
  text-align:center;
  padding:30px 20px 10px;
  font-size:32px;
  font-weight:800;
  letter-spacing:2px;
}

/* الشعار */
.logo{
  display:block;
  margin:0 auto;
  width:120px;
}

/* توزيع المجموعات */
#groups{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(350px,1fr));
  gap:25px;
  padding:25px;
}

/* كرت المجموعة */
.group{
  background:linear-gradient(145deg,#0a0a0a,#141414);
  border-radius:18px;
  padding:20px;
  border:1px solid rgba(255,215,0,0.15);
  box-shadow:0 10px 30px rgba(0,0,0,0.7);
  transition:0.3s;
}

/* حركة */
.group:hover{
  transform:translateY(-6px);
  box-shadow:0 15px 40px rgba(255,215,0,0.2);
}

/* اسم المجموعة */
.group h2{
  text-align:center;
  color:#FFD700;
  font-size:18px;
  margin-bottom:10px;
}

/* جدول */
table{
  width:100%;
  border-collapse:collapse;
  margin-bottom:10px;
}

/* رأس الجدول */
th{
  color:#FFD700;
  font-size:12px;
}

/* الصفوف */
td{
  padding:6px;
  text-align:center;
  border-bottom:1px solid rgba(255,255,255,0.08);
}

/* المتصدر */
tr:first-child{
  background:rgba(255,215,0,0.15);
}

/* المباراة */
.match{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:rgba(255,255,255,0.03);
  padding:8px;
  margin:6px 0;
  border-radius:10px;
}

/* أسماء الفرق */
.team{
  width:35%;
  font-size:13px;
}

/* النتيجة */
.score{
  display:flex;
  align-items:center;
  gap:6px;
}

/* input */
input{
  width:42px;
  height:30px;
  text-align:center;
  background:#000;
  border:1px solid #333;
  border-radius:6px;
  color:#FFD700;
  font-weight:bold;
}

/* focus */
input:focus{
  border:1px solid #FFD700;
  outline:none;
  box-shadow:0 0 6px gold;
}

/* زر */
button{
  width:100%;
  margin-top:12px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:linear-gradient(to right,#FFD700,#b8860b);
  color:black;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

/* hover زر */
button:hover{
  transform:scale(1.03);
  background:linear-gradient(to right,#b8860b,#FFD700);
}

</style>

</head>

<body>

<h1>⚽ World Cup</h1>
<div id="groups"></div>

<script>

const baseGroups = [
["Mexico","South Africa","South Korea","Czech Republic"],
["Canada","Qatar","bosnia and herzegovina","Switzerland"],
["Brazil","Morocco","Haiti","Scotland"],
["USA","Paraguay","Australia","Turkey"],
["Germany","Curacao","Ivory Coast","Ecuador"],
["Netherlands","Japan","Sweden","Tunisia"],
["Belgium","Egypt","Iran","New Zealand"],
["Spain","Cape Verde","Saudi Arabia","Uruguay"],
["France","Senegal","Iraq","Norway"],
["Argentina","Algeria","Austria","Jordan"],
["Portugal","Democratic Republic of congo ","Uzbekistan","Colombia"],
["England","Croatia","Ghana","Panama"]
];

function createMatches(teams){
let m=[];
for(let i=0;i<teams.length;i++){
for(let j=i+1;j<teams.length;j++){
m.push({t1:teams[i],t2:teams[j],g1:"",g2:""});
}}
return m;
}

let data=baseGroups.map((t,i)=>({
name:"Group "+String.fromCharCode(65+i),
teams:t,
matches:createMatches(t)
}));

// ✅ حساب الترتيب
function calculate(group){

let teams = {};

// تهيئة
group.teams.forEach(t=>{
teams[t] = {points:0,goals:0};
});

// الحساب الصحيح
group.matches.forEach(m=>{

// ✅ تجاهل المباريات الفارغة
if(m.g1 === "" || m.g2 === "") return;

let g1 = parseInt(m.g1);
let g2 = parseInt(m.g2);

// ✅ منع القيم الخاطئة
if(isNaN(g1) || isNaN(g2)) return;
if(g1 < 0 || g2 < 0) return;

// ✅ الأهداف (موجبة فقط)
teams[m.t1].goals += g1;
teams[m.t2].goals += g2;

// ✅ النقاط
if(g1 > g2){
teams[m.t1].points += 3;
}else if(g2 > g1){
teams[m.t2].points += 3;
}else{
teams[m.t1].points += 1;
teams[m.t2].points += 1;
}

});

// تحويل + ترتيب
let arr = Object.entries(teams).map(([name,val])=>({
name,
points:val.points,
goals:val.goals
}));

arr.sort((a,b)=>b.points - a.points || b.goals - a.goals);

return arr;
}

// تحديث
function update(g,m,t,val){

// ✅ إذا فاضي نخليه ""
if(val === ""){
if(t==1) data[g].matches[m].g1="";
else data[g].matches[m].g2="";
}else{

val = Math.max(0, parseInt(val)); // منع السالب

if(t==1) data[g].matches[m].g1 = val;
else data[g].matches[m].g2 = val;

}

render();
}
// حفظ
function save(){
localStorage.setItem("wc",JSON.stringify(data));
alert("✅ تم الحفظ");
}

// عرض
function render(){

let container=document.getElementById("groups");
container.innerHTML="";

data.forEach((g,gi)=>{

let table=calculate(g);

let html=`<h2>${g.name}</h2>

<table>
<tr><th>الفريق</th><th>نقاط</th><th>أهداف</th></tr>

${table.map(t=>`
<tr>
<td>${t.name}</td>
<td>${t.points}</td>
<td>${t.goals}</td>
</tr>
`).join("")}
</table>
`;

// المباريات
g.matches.forEach((m,mi)=>{
html+=`
<div class="match">
<div class="team">${m.t1}</div>

<div class="score">
<input type="number" value="${m.g1}"
oninput="update(${gi},${mi},1,this.value)"> -
<input type="number" value="${m.g2}"
oninput="update(${gi},${mi},2,this.value)">
</div>

<div class="team">${m.t2}</div>
</div>
`;
});


let div=document.createElement("div");
div.className="group";
div.innerHTML=html;
container.appendChild(div);

});

}

render();

</script>

</body>
</html>
